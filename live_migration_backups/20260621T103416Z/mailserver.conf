server {
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mail.housevo.us/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mail.housevo.us/privkey.pem; # managed by Certbot
    server_name mail.housevo.us webmail.housevo.us;
    root /var/www/openmailstack;
    index index.php index.html;
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:20000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /branding/ {
    alias /opt/housevo-branding/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    }

    location /postfixadmin {
        alias /var/www/postfixadmin/public/;
        index index.php;
        try_files $uri $uri/ /postfixadmin/index.php?$query_string;
    }

    location ~ ^/postfixadmin/(.+\.php)$ {
        alias /var/www/postfixadmin/public/$1;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/postfixadmin/public/$1;
    }

    # --- ActiveSync ---
    location ^~ /Microsoft-Server-ActiveSync {
        proxy_pass http://127.0.0.1:20000/Microsoft-Server-ActiveSync;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        

        # Massive timeouts and buffers for Direct Push
        proxy_connect_timeout 3600;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        proxy_buffer_size 128k;
        proxy_buffers 64 256k;
        proxy_busy_buffers_size 256k;
    }

    # --- CalDAV/CardDAV Redirects ---
    location = /.well-known/caldav {
        return 301 https://$host/caldav/;
    }

    location = /.well-known/carddav {
        return 301 https://$host/caldav/;
    }

    location /caldav {
        proxy_pass http://127.0.0.1:20000/caldav;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /SOGo/dav {
        rewrite ^/SOGo/dav/(.*)$ /caldav/$1 break;
        proxy_pass http://127.0.0.1:20000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- OpenMailStack Roundcube ---
    location /webmail {
        alias /var/www/roundcube;
        index index.php;
        try_files $uri $uri/ /webmail/index.php?$query_string;
    }
    location ~ ^/webmail/(.+\.php)$ {
        alias /var/www/roundcube/$1;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
    location ~ ^/webmail/(bin|config|temp|logs)/ {
        deny all;
    }




    # --- OpenMailStack Admin Portal ---
    location ^~ /SOGo/admin/rspamd/ { proxy_pass http://127.0.0.1:11334/; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location = /SOGo/admin {
        return 301 /SOGo/admin/;
    }
    location /SOGo/admin/ {
        alias /var/www/openmailstack-admin/public/;
        index index.php index.html;
        try_files $uri $uri/ @sogoadmin;
    }
    location @sogoadmin {
        rewrite ^/SOGo/admin/(.*)$ /SOGo/admin/index.php?$args last;
    }
    location ~ ^/SOGo/admin/(.+\.php)$ {
        alias /var/www/openmailstack-admin/public/$1;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/openmailstack-admin/public/$1;
    }

}
server {
    if ($host = mail.housevo.us) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = webmail.housevo.us) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name mail.housevo.us webmail.housevo.us;
    return 404; # managed by Certbot




    # --- OpenMailStack Admin Portal ---
    location ^~ /SOGo/admin/rspamd/ { proxy_pass http://127.0.0.1:11334/; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location = /SOGo/admin {
        return 301 /SOGo/admin/;
    }
    location /SOGo/admin/ {
        alias /var/www/openmailstack-admin/public/;
        index index.php index.html;
        try_files $uri $uri/ @sogoadmin;
    }
    location @sogoadmin {
        rewrite ^/SOGo/admin/(.*)$ /SOGo/admin/index.php?$args last;
    }
    location ~ ^/SOGo/admin/(.+\.php)$ {
        alias /var/www/openmailstack-admin/public/$1;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/openmailstack-admin/public/$1;
    }

}
