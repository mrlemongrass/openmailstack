# Fail2ban filter for OpenMailStack webmail login failures
# Log format: 2026-06-29T12:00:00.000Z [1.2.3.4] failed login for "user@example.com": unknown user
# After date stripping, the remaining line starts with a space before the bracket.

[Definition]
failregex = ^\s*\[<ADDR>\] failed login for .*

ignoreregex =
